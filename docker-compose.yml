version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - HF_HOME=/app/models
    volumes:
      - ~/data:/app/data
      - ./models:/app/models
    restart: unless-stopped